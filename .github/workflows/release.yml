name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build release
        run: cargo build --release --bin open-health

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-health-${{ matrix.os }}
          path: target/release/open-health*
